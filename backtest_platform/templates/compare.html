<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha 对比</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Microsoft YaHei',sans-serif; background:#0d1117; color:#c9d1d9; min-height:100vh; }
.header { background:#161b22; border-bottom:1px solid #30363d; padding:12px 20px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
.header h1 { color:#e94560; font-size:17px; }
.header nav { display:flex; gap:24px; }
.header nav a { color:#8b949e; text-decoration:none; font-size:12px; }
.header nav a:hover { color:#58a6ff; }
.header nav a.active { color:#e94560; }
.layout { display:flex; height:calc(100vh - 49px); }

/* Left panel: Alpha selection list */
.panel-left { width:380px; overflow-y:auto; padding:16px; background:#111820; border-right:1px solid #30363d; min-width:0; }
.panel-left h2 { font-size:13px; color:#58a6ff; margin-bottom:10px; }
.panel-left .subtitle { font-size:11px; color:#8b949e; margin-bottom:12px; }
.search-box { width:100%; padding:8px 10px; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#fff; font-size:12px; margin-bottom:10px; outline:none; }
.search-box:focus { border-color:#58a6ff; }
.alpha-list { max-height:calc(100vh - 220px); overflow-y:auto; }
.alpha-item { display:flex; align-items:flex-start; gap:8px; padding:8px 10px; border-bottom:1px solid #1c2533; cursor:pointer; transition:background 0.12s; }
.alpha-item:hover { background:rgba(88,166,255,0.05); }
.alpha-item.selected { background:rgba(88,166,255,0.1); }
.alpha-item input[type=checkbox] { margin-top:2px; accent-color:#58a6ff; cursor:pointer; }
.alpha-body { flex:1; min-width:0; }
.alpha-name { font-size:12px; color:#c9d1d9; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.alpha-expr { font-family:monospace; font-size:10px; color:#58a6ff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.alpha-meta { font-size:10px; color:#8b949e; margin-top:1px; }
.btn-compare { width:100%; padding:10px; background:#e94560; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:13px; margin-top:10px; }
.btn-compare:hover { background:#d63850; }
.btn-compare:disabled { background:#555; cursor:not-allowed; }
.selection-count { font-size:11px; color:#8b949e; margin-top:6px; text-align:center; }

/* Right panel: Results */
.panel-right { flex:1; overflow-y:auto; padding:20px; min-width:0; }
.panel-right .empty-state { text-align:center; padding:80px 20px; color:#8b949e; }
.panel-right .empty-state p { margin-top:8px; font-size:13px; }

/* Comparison table */
.compare-table-wrap { overflow-x:auto; margin-bottom:20px; }
.compare-table { width:100%; border-collapse:collapse; font-size:12px; }
.compare-table th { background:#1c2533; padding:8px 10px; text-align:left; color:#58a6ff; white-space:nowrap; position:sticky; top:0; }
.compare-table th:first-child { position:sticky; left:0; z-index:2; background:#1c2533; }
.compare-table td { padding:7px 10px; border-bottom:1px solid #1c2533; white-space:nowrap; }
.compare-table td:first-child { position:sticky; left:0; background:#0d1117; z-index:1; font-weight:bold; }
.compare-table tr:hover td { background:rgba(88,166,255,0.05); }
.compare-table tr:hover td:first-child { background:rgba(88,166,255,0.1); }
.compare-table .metric-row td:first-child { color:#8b949e; font-weight:normal; font-size:11px; }
.compare-table .best { color:#3fb950; font-weight:bold; }

/* Color legend markers */
.color-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; vertical-align:middle; }

/* Charts */
.chart-section { margin-bottom:20px; }
.chart-section h3 { font-size:13px; color:#8b949e; margin-bottom:10px; }
.chart-box { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:16px; }
.chart-box canvas { max-height:350px; }
.chart-legend { display:flex; flex-wrap:wrap; gap:12px; margin-top:10px; padding-top:8px; border-top:1px solid #1c2533; }
.chart-legend span { font-size:11px; color:#8b949e; }
</style>
</head>
<body>
<div class="header">
  <h1>Alpha 对比</h1>
  <nav style="display:flex;gap:24px;">
    <a href="/dashboard">仪表盘</a>
    <a href="/alpha_history">Alpha 历史</a>
    <a href="/compare" class="active">Alpha 对比</a>
    <a href="/correlation">相关性分析</a>
    <a href="/data_fields">数据字段</a>
    <a href="/operators">操作符</a>
	    <a href="/community">社区</a>
    <a href="/learn">学习</a>
    <a href="/logout">退出</a>
  </nav>
</div>

<div class="layout">
  <!-- Left: Alpha selection -->
  <div class="panel-left">
    <h2>选择 Alpha 进行对比</h2>
    <p class="subtitle">勾选 2~5 个已回测的 Alpha，点击"对比"查看侧对侧分析</p>
    <input type="text" class="search-box" id="searchBox" placeholder="搜索 Alpha 名称或表达式..." oninput="renderAlphaList()">
    <div class="alpha-list" id="alphaList">
      <div style="padding:20px;text-align:center;color:#8b949e;font-size:12px;">加载中...</div>
    </div>
    <button class="btn-compare" id="btnCompare" onclick="runCompare()" disabled>对比 (至少选2个)</button>
    <div class="selection-count" id="selectionCount">已选 0 个</div>
  </div>

  <!-- Right: Results -->
  <div class="panel-right" id="resultPanel">
    <div class="empty-state">
      <p style="font-size:24px;">&#9776;</p>
      <p>从左侧选择 2~5 个 Alpha 进行对比</p>
      <p style="font-size:11px;color:#484f58;margin-top:4px;">将显示指标对比表格、叠加 PnL 曲线和 IC 序列</p>
    </div>
  </div>
</div>

<script>
const COLORS = ['#3fb950', '#58a6ff', '#f0883e', '#e94560', '#bc8cff'];
const COLOR_NAMES = ['绿色', '蓝色', '橙色', '红色', '紫色'];

let allAlphas = [];
let selectedIds = new Set();
let pnlChart = null;
let icChart = null;

// ---- Load alpha list ----
async function loadAlphaList() {
  try {
    const resp = await fetch('/api/alpha/history');
    const data = await resp.json();
    allAlphas = data.records || [];
    renderAlphaList();
  }catch(e) {
    document.getElementById('alphaList').innerHTML =
      '<div style="padding:20px;text-align:center;color:#ff6b6b;font-size:12px;">加载失败: ' + e.message + '</div>';
  }
}

function renderAlphaList() {
  const query = (document.getElementById('searchBox').value || '').toLowerCase().trim();
  let filtered = allAlphas;
  if (query) {
    filtered = allAlphas.filter(a => {
      const name = (a.name || '').toLowerCase();
      const expr = (a.expression || '').toLowerCase();
      return name.includes(query) || expr.includes(query);
    });
  }

  const container = document.getElementById('alphaList');
  if (!filtered.length) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:#8b949e;font-size:12px;">暂无匹配的记录</div>';
    return;
  }

  let html = '';
  filtered.forEach(a => {
    const isSel = selectedIds.has(a.id);
    const m = a.metrics || {};
    html += '<div class="alpha-item' + (isSel ? ' selected' : '') + '" onclick="toggleAlpha(\'' + a.id + '\')">';
    html += '<input type="checkbox" ' + (isSel ? 'checked' : '') + ' onclick="event.stopPropagation();toggleAlpha(\'' + a.id + '\')">';
    html += '<div class="alpha-body">';
    html += '<div class="alpha-name">' + escHtml(a.name || a.expression) + '</div>';
    html += '<div class="alpha-expr">' + escHtml((a.expression || '').length > 50 ? a.expression.substring(0,50) + '...' : (a.expression || '')) + '</div>';
    html += '<div class="alpha-meta">IC ' + (m.pearson_ic || 0).toFixed(4) + ' | Sharpe ' + (m.sharpe || 0).toFixed(2) + ' | 超额 ' + ((m.annual_excess || 0)*100).toFixed(2) + '%</div>';
    html += '</div></div>';
  });
  container.innerHTML = html;
}

function toggleAlpha(id) {
  if (selectedIds.has(id)) {
    selectedIds.delete(id);
  } else {
    if (selectedIds.size >= 50) {
      alert('最多选择50个Alpha');
      return;
    }
    selectedIds.add(id);
  }
  updateSelectionUI();
  renderAlphaList();
}

function updateSelectionUI() {
  const count = selectedIds.size;
  document.getElementById('selectionCount').textContent = '已选 ' + count + ' 个';
  const btn = document.getElementById('btnCompare');
  btn.disabled = count < 2;
  btn.textContent = count < 2 ? '对比 (至少选2个)' : ('对比 (' + count + '个Alpha)');
}

// ---- Run comparison ----
async function runCompare() {
  if (selectedIds.size < 2) return;

  const ids = Array.from(selectedIds);
  const panel = document.getElementById('resultPanel');
  panel.innerHTML = '<div style="text-align:center;padding:60px;color:#8b949e;">对比计算中...</div>';

  try {
    const resp = await fetch('/api/alpha/compare', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ids:ids})
    });
    const data = await resp.json();
    if (data.error) {
      panel.innerHTML = '<div class="empty-state"><p style="color:#ff6b6b;">' + data.error + '</p></div>';
      return;
    }
    renderResults(data.alphas);
  }catch(e) {
    panel.innerHTML = '<div class="empty-state"><p style="color:#ff6b6b;">请求失败: ' + e.message + '</p></div>';
  }
}

function renderResults(alphas) {
  const panel = document.getElementById('resultPanel');
  if (!alphas || !alphas.length) {
    panel.innerHTML = '<div class="empty-state"><p>无数据</p></div>';
    return;
  }

  // Free previous chart instances
  if (pnlChart) { pnlChart.destroy(); pnlChart = null; }
  if (icChart) { icChart.destroy(); icChart = null; }

  // --- Build comparison table ---
  const metricKeys = [
    {key:'pearson_ic', label:'Pearson IC', fmt:v=>(v||0).toFixed(4), higherBetter:true},
    {key:'annual_excess', label:'年化超额', fmt:v=>((v||0)*100).toFixed(2)+'%', higherBetter:true},
    {key:'sharpe', label:'Sharpe', fmt:v=>(v||0).toFixed(2), higherBetter:true},
    {key:'fitness', label:'Fitness', fmt:v=>(v||0).toFixed(2), higherBetter:true},
    {key:'turnover', label:'Turnover', fmt:v=>((v||0)*100).toFixed(1)+'%', higherBetter:false},
    {key:'max_drawdown', label:'MaxDD', fmt:v=>((v||0)*100).toFixed(2)+'%', higherBetter:false},
    {key:'margin_bps', label:'Margin (bps)', fmt:v=>(v||0).toFixed(1), higherBetter:true},
    {key:'win_rate', label:'WinRate', fmt:v=>((v||0)*100).toFixed(1)+'%', higherBetter:true},
  ];

  let tableHtml = '<div class="compare-table-wrap"><table class="compare-table"><thead><tr>';
  tableHtml += '<th>指标</th>';
  alphas.forEach((a,i) => {
    tableHtml += '<th><span class="color-dot" style="background:' + COLORS[i] + '"></span>' + escHtml(a.name || a.expression.substring(0,30)) + '</th>';
  });
  tableHtml += '</tr></thead><tbody>';

  tableHtml += '<tr><td><strong>表达式</strong></td>';
  alphas.forEach((a,i) => {
    tableHtml += '<td style="font-family:monospace;font-size:10px;color:#58a6ff;max-width:250px;overflow:hidden;text-overflow:ellipsis;">' + escHtml((a.expression||'').length > 60 ? a.expression.substring(0,60)+'...' : (a.expression||'')) + '</td>';
  });
  tableHtml += '</tr>';

  tableHtml += '<tr><td><strong>类型</strong></td>';
  alphas.forEach((a,i) => {
    tableHtml += '<td>' + (a.type==='superalpha'?'组合':'单因子') + '</td>';
  });
  tableHtml += '</tr>';

  metricKeys.forEach(mk => {
    tableHtml += '<tr class="metric-row"><td>' + mk.label + '</td>';
    // Find best/worst values for highlighting
    let values = alphas.map(a => a.metrics[mk.key]);
    let bestIdx = -1;
    if (values.every(v => v !== undefined && v !== null)) {
      if (mk.higherBetter) {
        bestIdx = values.indexOf(Math.max(...values));
      } else {
        bestIdx = values.indexOf(Math.min(...values));
      }
    }
    alphas.forEach((a,i) => {
      const val = a.metrics[mk.key];
      const formatted = val !== undefined && val !== null ? mk.fmt(val) : '--';
      const cls = (i === bestIdx && alphas.length > 1) ? ' class="best"' : '';
      tableHtml += '<td' + cls + '>' + formatted + '</td>';
    });
    tableHtml += '</tr>';
  });

  tableHtml += '<tr><td><strong>回测时间</strong></td>';
  alphas.forEach((a,i) => {
    const ts = (a.timestamp || '').length >= 16 ? (a.timestamp || '').substring(0,16) : (a.timestamp || '--');
    tableHtml += '<td style="font-size:10px;color:#8b949e;">' + ts + '</td>';
  });
  tableHtml += '</tr>';

  tableHtml += '</tbody></table></div>';

  // --- Build charts ---
  let chartHtml = '';

  // PnL chart
  const maxPnlLen = Math.max(...alphas.map(a => (a.pnl_series||[]).length));
  chartHtml += '<div class="chart-section"><h3>累积 PnL 曲线 (超额收益, %)</h3>';
  chartHtml += '<div class="chart-box"><canvas id="pnlCompareChart"></canvas>';
  chartHtml += '<div class="chart-legend">';
  alphas.forEach((a,i) => {
    chartHtml += '<span><span class="color-dot" style="background:' + COLORS[i] + '"></span>' + escHtml(a.name || a.expression.substring(0,20)) + '</span>';
  });
  chartHtml += '</div></div></div>';

  // IC chart
  const maxIcLen = Math.max(...alphas.map(a => (a.ic_series||[]).length));
  chartHtml += '<div class="chart-section"><h3>Rank IC 序列 (近60日)</h3>';
  chartHtml += '<div class="chart-box"><canvas id="icCompareChart"></canvas>';
  chartHtml += '<div class="chart-legend">';
  alphas.forEach((a,i) => {
    chartHtml += '<span><span class="color-dot" style="background:' + COLORS[i] + '"></span>' + escHtml(a.name || a.expression.substring(0,20)) + '</span>';
  });
  chartHtml += '</div></div></div>';

  panel.innerHTML = tableHtml + chartHtml;

  // Render charts
  setTimeout(function() {
    renderPnlChart(alphas, maxPnlLen);
    renderIcChart(alphas, maxIcLen);
  }, 50);
}

function renderPnlChart(alphas, maxLen) {
  const ctx = document.getElementById('pnlCompareChart');
  if (!ctx) return;
  const labels = Array.from({length:maxLen}, (_,i) => i+1);
  const datasets = alphas.map((a,i) => ({
    label: a.name || a.expression.substring(0,20),
    data: padSeries(a.pnl_series||[], maxLen),
    borderColor: COLORS[i],
    backgroundColor: hexToRgba(COLORS[i], 0.08),
    borderWidth: 2,
    pointRadius: 0,
    fill: true,
  }));
  pnlChart = (null/*Chartctx.getContext('2d'), {
    type:'line',
    data:{labels, datasets},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{mode:'index', intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+parseFloat(ctx.raw||0).toFixed(4)+'%'}}
      },
      scales:{
        x:{ticks:{color:'#484f58',font:{size:10}}},
        y:{ticks:{color:'#484f58',font:{size:10}}}
      }
    }
  });
}

function renderIcChart(alphas, maxLen) {
  const ctx = document.getElementById('icCompareChart');
  if (!ctx) return;
  const labels = Array.from({length:maxLen}, (_,i) => i+1);
  const datasets = alphas.map((a,i) => ({
    label: a.name || a.expression.substring(0,20),
    data: padSeries(a.ic_series||[], maxLen),
    borderColor: COLORS[i],
    borderWidth: 1.5,
    pointRadius: 0,
    fill: false,
  }));
  icChart = (null/*Chartctx.getContext('2d'), {
    type:'line',
    data:{labels, datasets},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{mode:'index', intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+parseFloat(ctx.raw||0).toFixed(4)}}
      },
      scales:{
        x:{ticks:{color:'#484f58',font:{size:10}}},
        y:{ticks:{color:'#484f58',font:{size:10}}}
      }
    }
  });
}

function padSeries(series, targetLen) {
  if (!series || series.length === 0) return new Array(targetLen).fill(null);
  if (series.length >= targetLen) return series.slice(0, targetLen);
  // Pad with nulls at the beginning (align to the right, latest data aligned)
  const pad = targetLen - series.length;
  return [...new Array(pad).fill(null), ...series];
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// Init
loadAlphaList();
</script>
</body>
</html>

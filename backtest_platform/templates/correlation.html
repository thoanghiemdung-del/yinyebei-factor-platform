<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha 相关性分析</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Microsoft YaHei',sans-serif; background:#0d1117; color:#c9d1d9; }
.header { background:#161b22; border-bottom:1px solid #30363d; padding:12px 20px; display:flex; justify-content:center; align-items:center; position:sticky; top:0; z-index:100; }
.header h1 { color:#e94560; font-size:17px; }
.header nav { display:flex; gap:24px; }
.header nav a { color:#8b949e; text-decoration:none; font-size:12px; }
.header nav a:hover { color:#58a6ff; }
.header nav a.active { color:#e94560; }
.layout { display:flex; height:calc(100vh - 49px); }
.panel-left { width:380px; overflow-y:auto; padding:16px; background:#111820; border-right:1px solid #30363d; }
.panel-left h2 { font-size:13px; color:#58a6ff; margin-bottom:10px; }
.panel-left .subtitle { font-size:11px; color:#8b949e; margin-bottom:12px; }
.search-box { width:100%; padding:8px 10px; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#fff; font-size:12px; margin-bottom:10px; outline:none; }
.search-box:focus { border-color:#58a6ff; }
.alpha-list { max-height:calc(100vh - 280px); overflow-y:auto; }
.alpha-item { display:flex; align-items:flex-start; gap:8px; padding:8px 10px; border-bottom:1px solid #1c2533; cursor:pointer; transition:background 0.12s; }
.alpha-item:hover { background:rgba(88,166,255,0.05); }
.alpha-item.selected { background:rgba(88,166,255,0.1); }
.alpha-item input[type=checkbox] { margin-top:2px; accent-color:#58a6ff; cursor:pointer; }
.alpha-body { flex:1; min-width:0; }
.alpha-name { font-size:12px; color:#c9d1d9; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.alpha-expr { font-family:monospace; font-size:10px; color:#58a6ff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.alpha-meta { font-size:10px; color:#8b949e; margin-top:1px; }
.btn-analyze { width:100%; padding:10px; background:#e94560; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:13px; margin-top:10px; }
.btn-analyze:hover { background:#d63850; }
.btn-analyze:disabled { background:#555; cursor:not-allowed; }
.selection-count { font-size:11px; color:#8b949e; margin-top:6px; text-align:center; }
.panel-right { flex:1; overflow-y:auto; padding:20px; }
.panel-right .empty-state { text-align:center; padding:80px 20px; color:#8b949e; }
.panel-right .empty-state p { margin-top:8px; font-size:13px; }
.section-title { font-size:14px; color:#f0883e; margin-bottom:12px; padding-bottom:6px; border-bottom:1px solid #30363d; }
.corr-table-wrap { overflow-x:auto; margin-bottom:12px; }
.corr-table { border-collapse:collapse; font-size:12px; }
.corr-table th { background:#1c2533; padding:7px 10px; text-align:center; color:#58a6ff; white-space:nowrap; }
.corr-table th:first-child { text-align:left; }
.corr-table td { padding:7px 10px; text-align:center; border:1px solid #1c2533; white-space:nowrap; font-weight:bold; }
.corr-table td:first-child { text-align:left; color:#8b949e; }
.corr-table .diagonal { background:#1c2533; color:#484f58; }
.corr-summary { font-size:12px; color:#8b949e; line-height:1.8; padding:10px; background:#161b22; border:1px solid #30363d; border-radius:6px; }
.corr-summary strong { color:#58a6ff; }
</style>
</head>
<body>
<div class="header">
  <h1>Alpha 相关性分析</h1>
  <nav><a href="/dashboard">仪表盘</a><a href="/alpha_history">Alpha历史</a><a href="/data_fields">数据字段</a><a href="/operators">操作符</a><a href="/correlation">相关性</a><a href="/community">社区</a><a href="/learn">学习</a><a href="/logout">退出</a></nav>
</div>

<div class="layout">
  <div class="panel-left">
    <h2>选择 Alpha 进行相关性分析</h2>
    <p class="subtitle">勾选 3~10 个已回测的 Alpha，点击"分析"查看 PnL 相关性矩阵</p>
    <input type="text" class="search-box" id="searchBox" placeholder="搜索 Alpha 名称或表达式..." oninput="renderAlphaList()">
    <div style="display:flex;gap:6px;margin-bottom:8px;font-size:11px;color:#8b949e">
      <span>排序:</span>
      <span onclick="setSort('ic')" id="sort-ic" style="cursor:pointer;color:#58a6ff">IC</span>
      <span onclick="setSort('excess')" id="sort-excess" style="cursor:pointer;color:#8b949e">年化收益</span>
      <span onclick="setSort('sharpe')" id="sort-sharpe" style="cursor:pointer;color:#8b949e">Sharpe</span>
      <span onclick="setSort('time')" id="sort-time" style="cursor:pointer;color:#8b949e">时间</span>
    </div>
    <div class="alpha-list" id="alphaList">
      <div style="padding:20px;text-align:center;color:#8b949e;font-size:12px;">加载中...</div>
    </div>
    <button class="btn-analyze" id="btnAnalyze" onclick="runAnalysis()" disabled>分析 (至少选2个)</button>
    <div class="selection-count" id="selectionCount">已选 0 个</div>
  </div>

  <div class="panel-right" id="resultPanel">
    <div class="empty-state">
      <p style="font-size:24px;">&#9776;</p>
      <p>从左侧选择 3~10 个 Alpha 进行相关性分析</p>
      <p style="font-size:11px;color:#484f58;margin-top:4px;">将显示 PnL 日收益的相关性矩阵</p>
    </div>
  </div>
</div>

<script>
let allAlphas = [];
let sortBy = "ic";
let selectedIds = new Set();

async function loadAlphaList() {
  try {
    const resp = await fetch('/api/alpha/history');
    const data = await resp.json();
    allAlphas = data.records || [];
    renderAlphaList();
  } catch(e) {
    document.getElementById('alphaList').innerHTML = '<div style="padding:20px;text-align:center;color:#ff6b6b;font-size:12px;">加载失败: ' + e.message + '</div>';
  }
}

function setSort(col) {
    sortBy = col;
    document.querySelectorAll("[id^=sort-]").forEach(function(el) { el.style.color = "#8b949e"; });
    document.getElementById("sort-" + col).style.color = "#58a6ff";
    renderAlphaList();
  }
  function renderAlphaList() {
  const query = (document.getElementById('searchBox').value || '').toLowerCase().trim();
  let filtered = allAlphas.slice().sort(function(a, b) {
    var m = a.metrics || {}, n = b.metrics || {};
    if (sortBy === "ic") return Math.abs(n.pearson_ic || 0) - Math.abs(m.pearson_ic || 0);
    if (sortBy === "excess") return Math.abs(n.annual_excess || 0) - Math.abs(m.annual_excess || 0);
    if (sortBy === "sharpe") return (n.sharpe || 0) - (m.sharpe || 0);
    if (sortBy === "time") return (b.timestamp || "").localeCompare(a.timestamp || "");
    return 0;
  });
  if (query) {
    filtered = allAlphas.filter(a => {
      const name = (a.name || '').toLowerCase();
      const expr = (a.expression || '').toLowerCase();
      return name.indexOf(query) >= 0 || expr.indexOf(query) >= 0;
    });
  }
  let h = '';
  filtered.forEach(a => {
    const sel = selectedIds.has(a.id);
    const m = a.metrics || {};
    h += '<div class="alpha-item' + (sel ? ' selected' : '') + '" onclick="toggleAlpha(\'' + a.id + '\')">';
    h += '<input type="checkbox" ' + (sel ? 'checked' : '') + '>';
    h += '<div class="alpha-body"><div class="alpha-name">' + esc((a.name || a.expression || '').substring(0, 50)) + '</div>';
    h += '<div class="alpha-expr">' + esc((a.expression || '').substring(0, 60)) + '</div>';
    h += '<div class="alpha-meta">IC: ' + (m.pearson_ic || 0).toFixed(3) + ' | Ex: ' + ((m.annual_excess || 0) * 100).toFixed(1) + '%</div></div></div>';
  });
  document.getElementById('alphaList').innerHTML = h || '<div style="padding:20px;text-align:center;color:#8b949e;font-size:12px;">无匹配结果</div>';
}

function toggleAlpha(id) {
  if (selectedIds.has(id)) { selectedIds.delete(id); }
  else { if (selectedIds.size >= 50) { alert('最多选择50个'); return; } selectedIds.add(id); }
  document.getElementById('selectionCount').textContent = '已选 ' + selectedIds.size + ' 个';
  document.getElementById('btnAnalyze').disabled = selectedIds.size < 2;
  renderAlphaList();
}

async function runAnalysis() {
  if (selectedIds.size < 2) return;
  const ids = Array.from(selectedIds);
  document.getElementById('btnAnalyze').textContent = '分析中...';
  document.getElementById('btnAnalyze').disabled = true;
  try {
    const resp = await fetch('/api/alpha/correlation', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ids: ids})
    });
    const data = await resp.json();
    if (data.error) { alert(data.error); return; }
    renderCorrelationMatrix(data);
  } catch(e) {
    alert('分析失败: ' + e.message);
  } finally {
    document.getElementById('btnAnalyze').textContent = '分析 (至少选2个)';
    document.getElementById('btnAnalyze').disabled = false;
  }
}

function renderCorrelationMatrix(data) {
  const alphas = data.alphas || [];
  const matrix = data.corr_matrix || [];
  const summary = data.summary || {};
  const n = alphas.length;

  let h = '<div class="section-title">PnL 相关性矩阵</div>';
  h += '<div class="corr-table-wrap"><table class="corr-table"><thead><tr><th>Alpha</th>';
  for (let i = 0; i < n; i++) h += '<th title="' + esc(alphas[i].expression || '') + '">#' + (i + 1) + '</th>';
  h += '</tr></thead><tbody>';

  for (let i = 0; i < n; i++) {
    h += '<tr><td title="' + esc(alphas[i].expression || '') + '">' + esc((alphas[i].name || '').substring(0, 20)) + '</td>';
    for (let j = 0; j < n; j++) {
      const v = matrix[i] ? (matrix[i][j] || 0) : 0;
      let color = '#484f58';
      if (i !== j) {
        const absv = Math.abs(v);
        if (absv > 0.7) color = '#3fb950';
        else if (absv > 0.4) color = '#f0883e';
        else color = '#e94560';
      }
      const cls = i === j ? 'diagonal' : '';
      h += '<td class="' + cls + '" style="color:' + color + '">' + v.toFixed(3) + '</td>';
    }
    h += '</tr>';
  }
  h += '</tbody></table></div>';

  // Summary
  h += '<div class="corr-summary">';
  if (summary.max_pair) {
    h += '最高相关: <strong>' + esc(summary.max_pair[0]) + '</strong> vs <strong>' + esc(summary.max_pair[1]) + '</strong> = <strong>' + summary.max_pair[2].toFixed(3) + '</strong> | ';
  }
  if (summary.min_pair) {
    h += '最低相关: <strong>' + esc(summary.min_pair[0]) + '</strong> vs <strong>' + esc(summary.min_pair[1]) + '</strong> = <strong>' + summary.min_pair[2].toFixed(3) + '</strong>';
  }
  h += '</div>';

  document.getElementById('resultPanel').innerHTML = h;
}

function esc(s) { var d = document.createElement('div'); d.textContent = (s || ''); return d.innerHTML; }
loadAlphaList();
</script>
</body>
</html>
